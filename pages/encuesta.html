  <!-- Custom CSS -->
  <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-dark">

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="../index.html">Sabores Saludables</a>
    <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarSupportedContent">
      <ul class="navbar-nav ml-auto">
        <li class="nav-item">
          <a class="nav-link" href="agradecimientos.html">Agradecimientos</a>
        </li>

        </li>

          <a class="nav-link" href="galeria.html">Galería</a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<!-- Reservation Section -->
<section id="reservation" class="reservation-section bg-light py-5">
  <div class="container">
    <div class="row">
      <div class="col-md-6 mx-auto text-center">
        <h2>Completa nuestra Encuesta</h2>
        <p>Déjanos saber tus preferencias para una experiencia personalizada en Sabores Saludables.</p>
        <form action="reservar.html" method="post">
          <div class="form-group">
            <label for="name">Nombre:</label>
            <input type="text" id="name" name="name" class="form-control" required>
          </div>
          <div class="form-group">
            <label for="email">Correo electrónico:</label>
            <input type="email" id="email" name="email" class="form-control" required>
          </div>
          <div class="form-group">
            <label for="meal-preference">Preferencia de comida:</label>
            <select id="meal-preference" name="meal-preference" class="form-control" required>
              <option value="normal">Normal</option>
              <option value="vegana">Vegana</option>
              <option value="vegetariana">Vegetariana</option>
            </select>
          </div>
          <div class="form-group">
            <label for="allergies">Alergias alimentarias (opcional):</label>
            <textarea id="allergies" name="allergies" class="form-control"></textarea>
          </div>
          <button type="submit" class="btn btn-primary">Enviar Encuesta</button>
        </form>
      </div>
    </div>
  </div>
</section>

<!-- Footer -->
<footer class="footer-section py-4">

</body>
